services:
  neo4j:
    # Pinned to 5.20-community: newer 5.x community images regress on arm64 with
    # "JettyWebServer.loadStaticContent: Path is null" when starting the Browser
    # module. The backend only uses Bolt (:7687) so the Browser is non-essential,
    # but the healthcheck pings HTTP and a known-good version is the cleanest fix.
    image: neo4j:5.20-community
    container_name: sdlc-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-changeme-please}"
      # APOC removed — not needed by the MVP Cypher (simple MERGE/MATCH). Re-add
      # by setting NEO4J_PLUGINS='["apoc"]' once the network/plugin install path
      # works in your environment.
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    # Bind-mount onto host filesystem to sidestep the Docker VM virtual-disk limit.
    # Host has plenty of space; the Docker VM does not. See README for context.
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - sdlc

  estimator-backend:
    build:
      context: ./backend
    image: ai-sdlc-estimator-backend:latest
    container_name: sdlc-estimator-backend
    ports:
      - "8000:8000"
    environment:
      # Anthropic — required at runtime; the smoke harness falls back gracefully
      # when missing, but the real estimator needs this.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-6}"
      # Neo4j + Qdrant + Postgres: hostnames resolve via the `sdlc` Docker network.
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme-please}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_API_KEY: "${QDRANT_API_KEY:-}"
      # Postgres — historical estimates + twin calibration aggregates.
      # Uses asyncpg via SQLAlchemy 2.0 async; DSN can be overridden whole via
      # POSTGRES_DSN, or assembled from the discrete vars.
      POSTGRES_DSN: "${POSTGRES_DSN:-postgresql+asyncpg://${POSTGRES_USER:-estimator}:${POSTGRES_PASSWORD:-changeme-please}@postgres:5432/${POSTGRES_DB:-estimator}}"
      POSTGRES_MIGRATE_ON_START: "${POSTGRES_MIGRATE_ON_START:-true}"
      # CORS — the frontend runs on the host (not in the network), so allow
      # http://localhost:3000 by default.
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost:3000}"
      # docs-mcp-server — the tooling classifier consults it (as an MCP client over
      # streamable HTTP) to research unrecognized AI tools. Hardcoded to the
      # in-network hostname (like NEO4J_URI above); the host value in
      # .env is for `make be` only. To disable lookups, just don't run the
      # docs-mcp-server service — the connection fails gracefully → tools stay 'none'.
      DOCS_MCP_URL: "http://docs-mcp-server:6280/mcp"
      DOCS_MCP_AUTH_TOKEN: "${DOCS_MCP_AUTH_TOKEN:-}"
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - sdlc

  # Self-hosted documentation MCP server. The estimator backend connects to it as
  # an MCP client (streamable HTTP at /mcp) to identify AI dev tools it doesn't
  # recognize during Stage 3 tooling classification. Optional — the classifier
  # degrades to 'none' for unknown tools when this is down. To make searches return
  # results you must index docs into it (see arabold/docs-mcp-server docs); an
  # unindexed server still runs, Claude just falls back to its own knowledge.
  docs-mcp-server:
    image: ghcr.io/arabold/docs-mcp-server:latest
    container_name: sdlc-docs-mcp
    # --host 0.0.0.0 makes it listen on all interfaces inside the container so the
    # published port works; the MCP endpoint is served at /mcp on 6280.
    command: ["--protocol", "http", "--host", "0.0.0.0", "--port", "6280"]
    environment:
      # Embeddings provider — REQUIRED for scraping/indexing AND vector search to
      # return results. Without a key, scrape jobs and search no-op, so the tooling
      # classifier's scrape-on-miss step degrades and unknown tools stay 'none'.
      # OpenAI is the default; docs-mcp-server also supports Google/Bedrock/etc.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DOCS_MCP_EMBEDDING_MODEL: "${DOCS_MCP_EMBEDDING_MODEL:-text-embedding-3-small}"
    ports:
      # Published to the host on 0.0.0.0:6280 → reachable from the host at
      # http://localhost:6280/mcp (e.g. a host-run `make be` backend, your own MCP
      # client, or doc-indexing). In-network, other services use the service
      # hostname http://docs-mcp-server:6280/mcp.
      - "6280:6280"
    volumes:
      # Bind-mount under ./data like the other stateful services (sidesteps the
      # Docker VM virtual-disk limit; survives `make clean`).
      - ./data/docs-mcp:/data
    healthcheck:
      # Image ships node only (no curl/wget); probe the HTTP server with fetch.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:6280/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    networks:
      - sdlc

  estimator-frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* vars are inlined at build time. The frontend's API calls
        # originate in the user's BROWSER (not the container), so the backend
        # URL must be reachable from the host — i.e. localhost:8000, the port
        # that the estimator-backend service publishes.
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
    image: ai-sdlc-estimator-frontend:latest
    container_name: sdlc-estimator-frontend
    ports:
      - "3000:3000"
    depends_on:
      estimator-backend:
        condition: service_healthy
    networks:
      - sdlc

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sdlc-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # Qdrant ships without curl/wget; probe the TCP port with bash instead.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - sdlc

  postgres:
    # Historical estimates + per-phase rollups for twin calibration.
    # Pinned to 16-alpine — small image, current LTS-grade stability.
    image: postgres:16-alpine
    container_name: sdlc-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-estimator}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme-please}"
      POSTGRES_DB: "${POSTGRES_DB:-estimator}"
    # Bind-mount mirrors the Neo4j choice — host filesystem rather than the
    # Docker VM's virtual disk. Wipe by removing ./data/postgres.
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-estimator} -d ${POSTGRES_DB:-estimator}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - sdlc

volumes:
  qdrant_data:

networks:
  sdlc:
    driver: bridge
