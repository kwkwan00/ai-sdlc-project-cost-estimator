[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# DSN is overridden at runtime in env.py from the app settings; the value here
# only matters for offline / CLI usage and points at the local dev Postgres.
sqlalchemy.url = postgresql+asyncpg://estimator:changeme-please@localhost:5432/estimator

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
